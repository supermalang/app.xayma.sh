# CI for the Xayma.sh Vue 3 / Vite / TypeScript management app (Supabase backend).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Tests + coverage
        run: npm run test:coverage

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Any required VITE_* build-time env vars should be added as repo secrets
      # (e.g. VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) and referenced in an `env:` block here.
      - name: Build
        run: npm run build

      - name: Check for Supabase service role key in bundle
        run: |
          if grep -r "service_role" dist/ 2>/dev/null; then
            echo "ERROR: Supabase service role key found in built bundle!"
            echo "Service role keys must ONLY be in workflow engine environment variables, never in frontend code."
            exit 1
          else
            echo "✓ No service role key found in bundle"
          fi

      - name: Check for .env secrets in bundle
        run: |
          if grep -r "VITE_SUPABASE_ANON_KEY\|VITE_PAYMENT_GATEWAY_API_KEY" dist/ 2>/dev/null | grep -v node_modules; then
            echo "WARNING: Environment variable names found in bundle (expected for Vite placeholders)"
          else
            echo "✓ No secrets detected"
          fi
